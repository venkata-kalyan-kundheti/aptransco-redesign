<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ───────────────────────────────────────────────────── -->
    <title>APTRANSCO — Andhra Pradesh Transmission Corporation Limited</title>
    <meta name="description" content="Official website of APTRANSCO — tenders, notifications, annual reports, careers, RTI disclosures and transmission network information for Andhra Pradesh." />
    <meta name="keywords" content="APTRANSCO, Andhra Pradesh Transmission, tenders, notifications, electricity, power grid, Vijayawada" />
    <meta name="author" content="APTRANSCO, Government of Andhra Pradesh" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0C2D5E" />
    <meta name="color-scheme" content="light" />

    <!-- ── Favicon ────────────────────────────────────────────────────────── -->
    <!--
      Single SVG favicon — scales perfectly at all sizes (16px tab → 256px bookmark).
      No PNG fallback needed: all browsers that support <link rel="icon"> since 2020
      also support SVG favicons. The bolt + navy circle matches the header logo exactly.
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- ── Open Graph / Social ──────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="APTRANSCO" />
    <meta property="og:title"       content="APTRANSCO — Andhra Pradesh Transmission Corporation" />
    <meta property="og:description" content="Official portal for tenders, notifications, annual reports, careers and transmission network information." />
    <meta property="og:image"       content="/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="APTRANSCO official website banner" />

    <!-- ── Twitter Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="APTRANSCO — Official Website" />
    <meta name="twitter:description" content="Tenders, notifications, reports and careers for Andhra Pradesh Transmission Corporation." />
    <meta name="twitter:image"       content="/og-image.png" />

    <!-- ── Performance: DNS prefetch & preconnect ───────────────────────── -->
    <!--
      No third-party font CDN. Inter is self-hosted via @fontsource/inter —
      served from the same origin with full caching control.
      No third-party trackers or CDN scripts loaded (competition & gov policy).
    -->

    <!--
      Preload the SVG logo — it's the LCP (Largest Contentful Paint) element
      in the header. Preloading eliminates the waterfall delay.
    -->
    <link rel="preload" href="/logo.svg" as="image" type="image/svg+xml" />

    <!-- ── Canonical URL (update to real domain before deployment) ───────── -->
    <link rel="canonical" href="https://aptransco.gov.in/" />
    <script type="module" crossorigin src="/assets/index-OWcwqY4U.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/react-vendor-DSKy_jo4.js">
    <link rel="modulepreload" crossorigin href="/assets/router-vendor-1GS4ssWD.js">
    <link rel="modulepreload" crossorigin href="/assets/icons-vendor-FF_E0mKk.js">
    <link rel="stylesheet" crossorigin href="/assets/index-LChIue1O.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
